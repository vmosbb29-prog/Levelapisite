{% extends "base.html" %}
{% block title %}Register — Level-Up Bot{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon">⚡</div>
      <h1>Level-Up Bot</h1>
      <p>Create your account</p>
    </div>

    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/register" class="auth-form">
      <div class="field">
        <label for="username">Username</label>
        <input id="username" name="username" type="text" placeholder="Choose a username" required autocomplete="username" minlength="3" />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" placeholder="Choose a password" required autocomplete="new-password" minlength="6" />
      </div>
      <div class="field">
        <label for="confirm">Confirm Password</label>
        <input id="confirm" name="confirm" type="password" placeholder="Repeat your password" required autocomplete="new-password" />
      </div>
      <button type="submit" class="btn btn-primary btn-full">Create Account</button>
    </form>

    <p class="auth-footer">
      Already have an account? <a href="/login">Sign in</a>
    </p>
  </div>
</div>
{% endblock %}
